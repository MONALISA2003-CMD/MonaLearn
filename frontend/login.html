<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log in — MonaLearn</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#0F1B2E; --navy-2:#16243C;
    --brass:#C7A248; --brass-soft:#E4CE8E;
    --teal:#3A7D77;
    --coral:#C56A50;
    --parchment:#F3EEE2; --panel:#FBF9F3;
    --ink:#1A1F2B; --ink-soft:rgba(26,31,43,0.62); --cream:#EDE7D9;
    --line:rgba(26,31,43,0.1);
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    font-family:'Inter', sans-serif; background:var(--navy); color:var(--cream);
    min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px;
    -webkit-font-smoothing:antialiased;
  }
  h1{font-family:'Fraunces', serif; font-weight:600; letter-spacing:-0.01em;}
  .mono{font-family:'IBM Plex Mono', monospace;}
  a{color:inherit;}
  button{font-family:'Inter',sans-serif; cursor:pointer;}
  :focus-visible{outline:2px solid var(--brass); outline-offset:2px;}

  .card{width:100%; max-width:400px; background:var(--panel); color:var(--ink); border-radius:10px; padding:34px 30px; position:relative; overflow:hidden;}
  .logo{font-family:'Fraunces',serif; font-weight:600; font-size:1.2rem; display:flex; align-items:center; gap:8px; margin-bottom:24px;}
  .logo .dot{color:var(--brass); font-size:1.35rem; line-height:0;}

  .tabs{display:flex; gap:4px; background:var(--parchment); border-radius:8px; padding:4px; margin-bottom:22px;}
  .tab-btn{flex:1; padding:9px; border:none; background:none; border-radius:6px; font-size:0.86rem; font-weight:600; color:var(--ink-soft);}
  .tab-btn.active{background:var(--navy); color:var(--brass-soft);}

  .field{margin-bottom:14px;}
  .field label{display:block; font-size:0.76rem; color:var(--ink-soft); margin-bottom:6px;}
  .field input{
    width:100%; padding:11px 13px; border:1px solid var(--line); border-radius:6px;
    font-size:0.92rem; font-family:'Inter',sans-serif; outline:none; background:var(--panel); color:var(--ink);
  }
  .field input:focus{border-color:var(--teal);}

  .btn{width:100%; padding:12px; border-radius:6px; font-size:0.9rem; font-weight:600; border:1px solid transparent; margin-top:6px;}
  .btn-brass{background:var(--brass); color:var(--navy);}
  .btn-brass:hover:not(:disabled){background:var(--brass-soft);}
  .btn-brass:disabled{opacity:0.6; cursor:default;}

  .error-note{
    font-size:0.82rem; color:#A34A34; background:rgba(197,106,80,0.1); border:1px solid rgba(197,106,80,0.25);
    border-radius:6px; padding:10px 12px; margin-bottom:14px; display:none;
  }
  .error-note.show{display:block;}

  .demo-fallback{
    display:none; margin-top:16px; padding-top:16px; border-top:1px dashed var(--line);
    font-size:0.82rem; color:var(--ink-soft); text-align:center;
  }
  .demo-fallback.show{display:block;}
  .demo-fallback a{color:var(--teal); font-weight:600;}

  form.hidden{display:none;}
  .hint{font-size:0.76rem; color:var(--ink-soft); margin-top:14px; text-align:center;}
</style>
</head>
<body>
  <div class="card">
    <div class="logo">MonaLearn<span class="dot">·</span></div>

    <div class="tabs">
      <button class="tab-btn active" id="tabLogin">Log in</button>
      <button class="tab-btn" id="tabSignup">Sign up</button>
    </div>

    <div class="error-note" id="errorNote"></div>

    <form id="loginForm">
      <div class="field"><label for="loginEmail">Email</label><input type="email" id="loginEmail" required autocomplete="email"></div>
      <div class="field"><label for="loginPassword">Password</label><input type="password" id="loginPassword" required autocomplete="current-password"></div>
      <button class="btn btn-brass" type="submit" id="loginSubmit">Log in</button>
    </form>

    <form id="signupForm" class="hidden">
      <div class="field"><label for="signupName">Full name</label><input type="text" id="signupName" required autocomplete="name"></div>
      <div class="field"><label for="signupEmail">Email</label><input type="email" id="signupEmail" required autocomplete="email"></div>
      <div class="field"><label for="signupPassword">Password</label><input type="password" id="signupPassword" required minlength="8" autocomplete="new-password"></div>
      <button class="btn btn-brass" type="submit" id="signupSubmit">Create account</button>
    </form>

    <div class="hint">This calls the real backend — run it locally (see the README) for this to actually work.</div>

    <div class="demo-fallback" id="demoFallback">
      Can't reach the server. <a href="dashboard.html?demo=1">Continue in demo mode →</a>
    </div>
  </div>

<script src="auth.js"></script>
<script>
  const tabLogin = document.getElementById('tabLogin');
  const tabSignup = document.getElementById('tabSignup');
  const loginForm = document.getElementById('loginForm');
  const signupForm = document.getElementById('signupForm');
  const errorNote = document.getElementById('errorNote');
  const demoFallback = document.getElementById('demoFallback');

  function showTab(which){
    const isLogin = which === 'login';
    tabLogin.classList.toggle('active', isLogin);
    tabSignup.classList.toggle('active', !isLogin);
    loginForm.classList.toggle('hidden', !isLogin);
    signupForm.classList.toggle('hidden', isLogin);
    errorNote.classList.remove('show');
  }
  tabLogin.addEventListener('click', () => showTab('login'));
  tabSignup.addEventListener('click', () => showTab('signup'));

  function showError(message){
    errorNote.textContent = message;
    errorNote.classList.add('show');
  }

  function nextDestination(){
    const params = new URLSearchParams(window.location.search);
    return params.get('next') || 'dashboard.html';
  }

  async function afterLogin(token){
    MonaAuth.setToken(token);
    window.location.href = nextDestination();
  }

  loginForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    errorNote.classList.remove('show');
    demoFallback.classList.remove('show');
    const submitBtn = document.getElementById('loginSubmit');
    submitBtn.disabled = true; submitBtn.textContent = 'Logging in…';

    const email = document.getElementById('loginEmail').value;
    const password = document.getElementById('loginPassword').value;

    try{
      const res = await fetch(`${MonaAuth.API_BASE_URL}/api/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: new URLSearchParams({ username: email, password }),
        signal: AbortSignal.timeout(3000),
      });
      if(!res.ok){
        const body = await res.json().catch(() => ({}));
        throw { userFacing: body.detail || 'Incorrect email or password.' };
      }
      const data = await res.json();
      await afterLogin(data.access_token);
    } catch(err){
      if(err && err.userFacing){
        showError(err.userFacing);
      } else {
        showError("Can't reach the server right now.");
        demoFallback.classList.add('show');
      }
      console.info('MonaLearn login error:', err);
    } finally {
      submitBtn.disabled = false; submitBtn.textContent = 'Log in';
    }
  });

  signupForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    errorNote.classList.remove('show');
    demoFallback.classList.remove('show');
    const submitBtn = document.getElementById('signupSubmit');
    submitBtn.disabled = true; submitBtn.textContent = 'Creating account…';

    const full_name = document.getElementById('signupName').value;
    const email = document.getElementById('signupEmail').value;
    const password = document.getElementById('signupPassword').value;

    try{
      const res = await fetch(`${MonaAuth.API_BASE_URL}/api/auth/signup`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password, full_name }),
        signal: AbortSignal.timeout(3000),
      });
      if(!res.ok){
        const body = await res.json().catch(() => ({}));
        throw { userFacing: body.detail || 'Could not create that account.' };
      }
      const data = await res.json();
      await afterLogin(data.access_token);
    } catch(err){
      if(err && err.userFacing){
        showError(err.userFacing);
      } else {
        showError("Can't reach the server right now.");
        demoFallback.classList.add('show');
      }
      console.info('MonaLearn signup error:', err);
    } finally {
      submitBtn.disabled = false; submitBtn.textContent = 'Create account';
    }
  });

  // If already logged in, skip straight through.
  if(MonaAuth.getToken()){
    window.location.href = nextDestination();
  }
</script>
</body>
</html>
