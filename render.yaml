# Render blueprint for MonaLearn.
#
# Usage:
#   1. Push this repo to GitHub.
#   2. In Render: New > Blueprint > pick this repo. Render reads this file
#      and provisions the service below.
#   3. Set ANTHROPIC_API_KEY, DATABASE_URL, JWT_SECRET_KEY, and SEED_SECRET
#      in the Render dashboard for monalearn-api (they're marked
#      sync: false below so they're never committed to git).
#   4. Turn OFF "Auto-Deploy" on monalearn-api in Render's settings if you're
#      using the GitHub Actions deploy-backend workflow to gate deploys on
#      CI passing first. Leave it ON if you'd rather let Render deploy on
#      every push with no gate.
#
# The resource-intelligence cron job that used to live in this file was
# removed — Render's free tier doesn't include cron jobs. The same check
# now runs for free via GitHub Actions instead:
# .github/workflows/resource-intelligence.yml
#
# Region note: "frankfurt" is used below as a reasonable middle ground for
# East Africa-based traffic — Render's regions are oregon, ohio, virginia,
# frankfurt, and singapore. Singapore may be worth testing too; pick
# whichever measures lower latency for your actual users.

services:
  - type: web
    name: monalearn-api
    runtime: python
    plan: free
    region: frankfurt
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: SEED_SECRET
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.9
