name: Unpack project zip

on:
  push:
    branches: [main]

jobs:
  unpack:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Find and extract zip
        run: |
          ZIP_FILE=$(find . -maxdepth 1 -name "*.zip" | head -n 1)
          if [ -z "$ZIP_FILE" ]; then
            echo "No zip file found — nothing to do."
            exit 0
          fi
          rm -rf _extracted
          unzip -o "$ZIP_FILE" -d _extracted
          shopt -s dotglob nullglob
          TOPDIRS=(_extracted/*/)
          if [ "${#TOPDIRS[@]}" -eq 1 ] && [ "$(find _extracted -mindepth 1 -maxdepth 1 | wc -l)" -eq 1 ]; then
            SRC="${TOPDIRS[0]}"
          else
            SRC="_extracted/"
          fi
          cp -a "$SRC." .
          rm -rf _extracted "$ZIP_FILE"
          find .github/workflows -type f ! -name "unpack.yml" -delete 2>/dev/null || true

      - name: Commit extracted files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Auto-extract project zip"
          git push
